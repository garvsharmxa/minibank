spring.application.name=AccountService

# JWT Secret (must match AuthService)
jwt.secret=${JWT_SECRET:your-fallback-secret-key-min-32-chars-long-1234567890}

# AES Secret (must be 16, 24, or 32 bytes)
aes.secret-key=${AES_SECRET:my-secret-key-that-is-32-bytes!}

server.port=8083

# DB config
spring.datasource.url=jdbc:postgresql://localhost:5435/account_db
spring.datasource.username=accountuser
spring.datasource.password=accountpass123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Customer Service URL for inter-service communication
customer.service.url=http://localhost:8082

# Eureka Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Logging configuration to suppress DNS warnings
logging.level.io.netty.resolver.dns=ERROR
logging.level.reactor.netty.http.client=ERROR