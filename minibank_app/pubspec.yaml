name: minibank_app
description: "MiniBank - Modern Mobile Banking Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Routing
  go_router: ^14.8.1

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Typography
  google_fonts: ^6.2.1

  # UI Enhancements
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  lottie: ^3.3.1
  flutter_animate: ^4.5.2

  # Utilities
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/animations/
