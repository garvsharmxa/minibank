spring.application.name=ApiGateway
server.port=8090

# ------------ Gateway Routes ------------
# Route 1 - Account Service
spring.cloud.gateway.routes[0].id=account-service
spring.cloud.gateway.routes[0].uri=lb://ACCOUNTSERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/accounts/**

# Route 2 - Customer Service
spring.cloud.gateway.routes[1].id=customer-service
spring.cloud.gateway.routes[1].uri=lb://CUSTOMERSERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/customers/**

# Route 3 - KYC Service
spring.cloud.gateway.routes[2].id=kyc-service
spring.cloud.gateway.routes[2].uri=lb://KYCSERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/kyc/**

# Route 4 - Card Service
spring.cloud.gateway.routes[3].id=card-service
spring.cloud.gateway.routes[3].uri=lb://CARDSERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/cards/**

# Route 5 - Transaction Service
spring.cloud.gateway.routes[4].id=transaction-service
spring.cloud.gateway.routes[4].uri=lb://TRANSACTIONSERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/transactions/**

# Route 6 - Auth Service
spring.cloud.gateway.routes[5].id=auth-service
spring.cloud.gateway.routes[5].uri=lb://AUTHSERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/auth/**

# ------------ Eureka Config ------------
eureka.instance.prefer-ip-address=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
