spring.application.name=CardService

# JWT Secret (must match AuthService)
jwt.secret=${JWT_SECRET:your-fallback-secret-key-min-32-chars-long-1234567890}

# AES Secret (must be 16, 24, or 32 bytes)
aes.secret-key=${AES_SECRET:my-secret-key-that-is-32-bytes!}

server.port=8085

spring.datasource.url=jdbc:postgresql://localhost:5437/card_db
spring.datasource.username=carduser
spring.datasource.password=cardpass123

spring.jpa.hibernate.ddl-auto=update

# Eureka Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
